        const QUESTIONS = {
            roots: {
                start: [
                    'Без чего ты не представляешь свою жизнь?',

                ],
                deep: [

                    'Что поддерживало тебя в самые трудные моменты — и помогает до сих пор?',

                ],
                body: ['Когда ты думаешь о том, что тебя по-настоящему держит на плаву — где в теле появляется тепло, спокойствие, единение? Если отклика нет — возможно, эта опора не твоя или больше не актуальна.'],
            },
            trunk: {
                start: ['Какие свои качества, достижения считаешь поводом для гордости?'],
                deep: [
                    'Какие ресурсы помогут тебе продвигаться ближе к вкушению плодов по каждой из веток?',

                ],
                body: ['При взгляде на ресурсы — какие вызывают ощущение «я могу», а какие напряжение или сжатие? Это сигнал: одни поддержать и усилить, к другим изменить отношение, увидеть силу и принять.'],
            },
            branches: {
                start: ['Если бы у тебя была одна сфера, на которой нужно сосредоточиться полгода — какая?'],
                deep: [
                    'Топ каких сфер жизни больше всего хочешь изменить, улучшить, вырасти в ближайшие месяцы или год? Выбери каждой приоритет от 1 до 5, ориентируясь на доступные ресурсы.',
                    'Какие ветки уже получают твоё внимание и энергию, даже если ты этого не замечаешь?',

                ],
                body: ['Какие основные векторы в твоей жизни самые важные — прочти их название и следи за откликом тела, где замечаешь отклик? Если отклика нет — возможно, желание не лично твоё, а взято извне.'],
            },
            crown: {
                start: ['Какой ты хочешь видеть свою жизнь через год? Подумай и представь свои дни по каждой из приоритетных сфер.'],
                deep: [
                    'Какой плод самый важный на каждой ветке — тот, что подарит желаемую реальность?',

                ],
                body: [
                    'Когда ты представляешь, что плод сорван — какое ощущение? Радость и спокойствие — твой. Тревога и пустота — возможно, цель не твоя.',
                    'Какими ощущениями откликается в теле общий взгляд на крону целиком?',

        // ===== ВНУТРЕННИЕ КОМПОНЕНТЫ =====

        function DeleteBtn({ onClick }) {
            const [hover, setHover] = useState(false);
            return (
                <button
                    onMouseDown={(e) => e.stopPropagation()}
                    onMouseEnter={() => setHover(true)}
                    onMouseLeave={() => setHover(false)}
                    onClick={onClick}
                    style={{
                        position: 'absolute', top: '-7px', right: '-7px',
                        width: '20px', height: '20px', borderRadius: '50%',
                        background: hover ? '#d93838' : '#e05050',
                        border: '2px solid white', color: 'white',
                        cursor: 'pointer', fontSize: '11px', fontWeight: 600,
                        fontFamily: 'Manrope, sans-serif',
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        boxShadow: '0 2px 6px rgba(0,0,0,0.2)',
                        zIndex: 10, transition: 'background 0.15s', lineHeight: 1,
                    }}
                >×</button>
            );
        }

        function useDraggable({ item, containerRef, onDrag, onEdit }) {
            const [dragging, setDragging] = useState(false);
            const dragRef = useRef({ startX: 0, startY: 0, moved: false });

            const handleMouseDown = (e) => {
                e.preventDefault();
                e.stopPropagation();
                dragRef.current = { startX: e.clientX, startY: e.clientY, moved: false };
                setDragging(true);
            };

            useEffect(() => {
                if (!dragging) return;
                const handleMove = (e) => {
                    const dx = Math.abs(e.clientX - dragRef.current.startX);
                    const dy = Math.abs(e.clientY - dragRef.current.startY);
                    if (dx > 3 || dy > 3) dragRef.current.moved = true;
                    if (!containerRef.current) return;
                    const rect = containerRef.current.getBoundingClientRect();
                    const newX = ((e.clientX - rect.left) / rect.width) * 100;
                    const newY = ((e.clientY - rect.top) / rect.height) * 100;
                    onDrag(item.id, Math.max(0, Math.min(100, newX)), Math.max(0, Math.min(100, newY)));
                };
                const handleUp = () => {
                    setDragging(false);
                    if (!dragRef.current.moved) onEdit(item);
                };
                document.addEventListener('mousemove', handleMove);
                document.addEventListener('mouseup', handleUp);
                return () => {
                    document.removeEventListener('mousemove', handleMove);
                    document.removeEventListener('mouseup', handleUp);
                };
            }, [dragging]);

            return { dragging, handleMouseDown };
        }

        function RootItem({ item, onEdit, onDelete, onDrag, containerRef }) {
            const [hover, setHover] = useState(false);
            const slot = ROOT_SLOTS.find(s => s.id === item.slotId);
            const x = item.x ?? slot?.x ?? 50;
            const y = item.y ?? slot?.y ?? 95;
            const { dragging, handleMouseDown } = useDraggable({ item, containerRef, onDrag, onEdit });
            return (
                <div
                    onMouseDown={handleMouseDown}
                    onMouseEnter={() => setHover(true)}
                    onMouseLeave={() => setHover(false)}
                    style={{
                        position: 'absolute', left: `${x}%`, top: `${y}%`,
                        transform: `translate(-50%, -50%) scale(${dragging ? 1.05 : hover ? 1.03 : 1})`,
                        background: 'linear-gradient(135deg, #B8896B, #A07958)',
                        borderRadius: '10px', padding: '7px 13px',
                        cursor: dragging ? 'grabbing' : 'grab',
                        transition: dragging ? 'none' : 'transform 0.2s cubic-bezier(0.4,0,0.2,1), box-shadow 0.2s',
                        boxShadow: dragging ? '0 12px 28px rgba(139,99,68,0.4)' : hover ? '0 4px 12px rgba(139,99,68,0.3)' : '0 2px 6px rgba(0,0,0,0.15)',
                        zIndex: dragging ? 1000 : hover ? 100 : 10,
                        maxWidth: '120px',
                    }}
                >
                    <span style={{ color: 'white', fontSize: '13px', fontWeight: 500, letterSpacing: '0.01em', wordBreak: 'break-word', textAlign: 'center', display: 'block', pointerEvents: 'none', lineHeight: 1.3 }}>{item.text}</span>
                    {hover && !dragging && <DeleteBtn onClick={(e) => { e.stopPropagation(); onDelete(item.id); }} />}
                </div>
            );
        }

        function BranchItem({ item, onEdit, onDelete }) {
            const [hover, setHover] = useState(false);
            const slot = BRANCH_SLOTS.find(s => s.id === item.slotId);
            if (!slot) return null;
            return (
                <div
                    onMouseEnter={() => setHover(true)}
                    onMouseLeave={() => setHover(false)}
                    onClick={() => onEdit(item)}
                    style={{
                        position: 'absolute', left: `${slot.x}%`, top: `${slot.y}%`,
                        transform: `translate(-50%, -50%) rotate(${slot.angle}deg) scale(${hover ? 1.05 : 1})`,
                        background: 'linear-gradient(135deg, rgba(205,225,155,0.9), rgba(174,213,129,0.8))',
                        backdropFilter: 'blur(6px)', WebkitBackdropFilter: 'blur(6px)',
                        padding: '7px 16px', borderRadius: '999px', cursor: 'pointer',
                        transition: 'transform 0.2s cubic-bezier(0.4,0,0.2,1), box-shadow 0.2s',
                        boxShadow: hover ? '0 4px 12px rgba(139,175,92,0.35)' : '0 2px 6px rgba(0,0,0,0.12)',
                        border: '1px solid rgba(255,255,255,0.4)',
                        zIndex: hover ? 100 : 20,
                    }}
                >
                    <span style={{ color: '#3D5228', fontSize: '12px', fontWeight: 600, letterSpacing: '0.02em', whiteSpace: 'nowrap' }}>{item.text}</span>
                    {hover && <DeleteBtn onClick={(e) => { e.stopPropagation(); onDelete(item.id); }} />}
                </div>
            );
        }

        function TrunkItem({ item, autoX, autoY, onEdit, onDelete, onDrag, containerRef }) {
            const [hover, setHover] = useState(false);
            const x = item.x ?? autoX;
            const y = item.y ?? autoY;
            const { dragging, handleMouseDown } = useDraggable({ item, containerRef, onDrag, onEdit });
            return (
                <div
                    onMouseDown={handleMouseDown}
                    onMouseEnter={() => setHover(true)}
                    onMouseLeave={() => setHover(false)}
                    style={{
                        position: 'absolute', left: `${x}%`, top: `${y}%`,
                        transform: `translate(-50%, -50%) scale(${dragging ? 1.05 : hover ? 1.03 : 1})`,
                        background: 'linear-gradient(135deg, #7A8D6A, #5B6E4E)',
                        borderRadius: '8px', padding: '5px 11px',
                        cursor: dragging ? 'grabbing' : 'grab',
                        transition: dragging ? 'none' : 'transform 0.2s cubic-bezier(0.4,0,0.2,1), box-shadow 0.2s',
                        boxShadow: dragging ? '0 12px 28px rgba(91,110,78,0.4)' : hover ? '0 4px 12px rgba(91,110,78,0.3)' : '0 2px 6px rgba(0,0,0,0.15)',
                        zIndex: dragging ? 1000 : hover ? 100 : 10,
                        maxWidth: '110px',
                    }}
                >
                    <span style={{ color: 'white', fontSize: '12px', fontWeight: 500, letterSpacing: '0.01em', textAlign: 'center', wordBreak: 'break-word', display: 'block', pointerEvents: 'none', lineHeight: 1.3 }}>{item.text}</span>
                    {hover && !dragging && <DeleteBtn onClick={(e) => { e.stopPropagation(); onDelete(item.id); }} />}
                </div>
            );
        }

        function FruitItem({ item, onEdit, onDelete, onHarvest, onDrag, containerRef }) {
            const [hover, setHover] = useState(false);
            const [menuOpen, setMenuOpen] = useState(false);
            const harvested = !!item.harvested;
            const { dragging, handleMouseDown } = useDraggable({
                item, containerRef,
                onDrag: (id, x, y) => { setMenuOpen(false); onDrag(id, x, y); },
                onEdit: () => setMenuOpen(true),
            });

            useEffect(() => {
                if (!menuOpen) return;
                const close = () => setMenuOpen(false);
                const t = setTimeout(() => document.addEventListener('mousedown', close), 0);
                return () => { clearTimeout(t); document.removeEventListener('mousedown', close); };
            }, [menuOpen]);

            return (
                <div
                    onMouseDown={handleMouseDown}
                    onMouseEnter={() => setHover(true)}
                    onMouseLeave={() => setHover(false)}
                    style={{
                        position: 'absolute', left: `${item.x}%`, top: `${item.y}%`,
                        transform: `translate(-50%, -50%) scale(${dragging ? 1.08 : hover ? 1.04 : 1})`,
                        zIndex: dragging ? 1000 : (hover || menuOpen) ? 100 : 15,
                    }}
                >
                    {/* Сам плод */}
                    <div style={{
                        position: 'relative',
                        minWidth: '62px', minHeight: '62px',
                        borderRadius: '50%',
                        background: harvested
                            ? 'radial-gradient(circle at 32% 28%, #C9A89B 0%, #B0897C 55%, #8F6A5C 100%)'
                            : 'radial-gradient(circle at 32% 28%, #F2A088 0%, #E8876B 55%, #C76A4F 100%)',
                        padding: '10px',
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        cursor: dragging ? 'grabbing' : 'grab',

        // ===== ВСПЛЫВАЮЩАЯ ПОДСКАЗКА (popover) ДЛЯ КНОПОК =====
        function InfoPopover({ zone, onClose, onShowExample, anchorRef }) {
            const popRef = useRef(null);
            useEffect(() => {
                const handler = (e) => {
                    if (popRef.current && !popRef.current.contains(e.target)) {
                        // Игнорируем клики по самой иконке-якорю — пусть toggle отрабатывает кнопка
                        if (anchorRef && anchorRef.current && anchorRef.current.contains(e.target)) return;
                        onClose();
                    }
                };
                setTimeout(() => document.addEventListener('mousedown', handler), 0);
                return () => document.removeEventListener('mousedown', handler);
            }, []);
            const info = ZONE_INFO[zone];
            return (
                <div ref={popRef} style={{
                    position: 'absolute',
                    top: 'calc(100% + 8px)',
                    right: 0,
                    width: '296px',
                    background: 'white',
                    borderRadius: '12px',

                            <p>Дерево — это не цель, это <em>отпечаток</em>. На уровне головы и эмоций ты смотришь на себя через осознанность и вопросы, формулируешь путь к тому, что приближает тебя к счастью. Реальный путь может отличаться — но твой главный инструмент, мозг, теперь знает твои настоящие желания. На пути ты сможешь опираться на эти мысли и чувства, когда станет сложно или страшно.</p>
                        </Section>

                        <Section title="Как устроено дерево">
                            <p className="serif" style={{ fontSize: '17px', fontStyle: 'italic', color: 'var(--ink-soft)', padding: '16px 20px', background: 'rgba(184,137,107,0.08)', borderRadius: '12px', borderLeft: '2px solid var(--terracotta)', margin: '8px 0 16px' }}>
                                Крона не вырастает шире, чем позволяют корни. Ствол не может включать ресурсы, выходящие за пределы того, каким ты себя ощущаешь. Корни не питают конструкцию, если ты не видишь, как опираешься на них в разных ситуациях. Всё связано.
                            </p>
                            <p><strong>Корни</strong> — то, на что ты опирался, опираешься и будешь опираться. Родители, друзья, опыт боли, после которой ты стал сильнее. В домиках внизу дерева ты собираешь эти опоры, видишь, как они помогали, замечаешь связь с твоими мечтами.</p>
                            <p><strong>Ствол</strong> держится прочно за счёт корней. Это твои актуальные ресурсы: победы, поражения, работа, деньги, качества, которые укрепляют опору на себя — те, которыми гордишься и открыто проявляешь, и те, что прячешь или хочешь трансформировать. Ствол — это видимая, честная картина «что у меня сейчас есть, без деления на хорошо или плохо, просто как есть, без оценок».</p>
                            <p><strong>Крона</strong> растёт настолько, насколько ты ухаживаешь за корнями и направляешь свет внимания на дерево. Корни уходят глубже, когда ты замечаешь моменты опоры. Крона расширяется, когда ты признаёшь свои ресурсы. Плоды зреют, когда ты понимаешь: «у меня есть или будет время, желание и ресурс для этого».</p>

                        <Section title="На каких подходах основано">
                            <ResearchCard num="1" title="ACT — Acceptance & Commitment Therapy" body="Терапия третьей волны: принятие, осознанность, ясность ценностей, действие из ценностей. Корни ↔ ценности, Ствол ↔ принятие реальности, Ветки и Плоды ↔ committed action. Мета-анализ 65 исследований (Springer, 2025) показал умеренный эффект ACT (Hedges' g = 0.72) на снижение тревоги и депрессии и рост психологической гибкости." />
                            <ResearchCard num="2" title="Implementation Intentions" body="Формулировка целей в формате «когда X, то Y» удваивает шанс их достижения. Мета-анализ 94 исследований Голвитцера и Шерана показал эффект d = 0.65 (medium-to-large). Поэтому плоды формулируются конкретно — с местом, временем и ресурсом." />
                            <ResearchCard num="3" title="Self-compassion (Кристин Нефф)" body="Заполнять дерево нужно с теплом к себе, без самокритики. Мета-анализ 56 RCT (Mindfulness, 2023) подтвердил, что self-compassion интервенции снижают депрессию, тревогу и стресс. Корни — это инструмент самосострадания: «у меня есть на что опереться»." />
                            <ResearchCard num="4" title="Интроспекция и интероцепция — взгляд внутрь" body="Дерево раскрывается полнее, когда заполняешь его, заглядывая внутрь, а не на автомате. Интроспекция — это наблюдение за своими мыслями, ценностями и чувствами; она отвечает на вопрос «что я думаю и чувствую». Интероцепция — способность слышать сигналы тела: «где это живёт и есть ли настоящий отклик». Вместе они защищают от того, чтобы заполнить дерево чужими, заученными ответами. Систематический обзор (Frontiers, 2020) показал: чем выше осознанность тела, тем эффективнее регуляция эмоций. Поэтому в каждой зоне есть вопрос «что говорит тело»." />
                        </Section>

                        <Section title="Дерево живое">
                            <p>Дерево не делается один раз и навсегда. Реальность меняется — у тебя появляются новые ресурсы, что-то отпадает, фокус смещается. Возвращайся к дереву, когда чувствуешь, что внутри что-то сдвинулось.</p>
                            <p>Посмотри на ствол: всё ли ещё работает на тебя? Глянь на ветки фокуса — энергия идёт туда же или сместилась? Какие плоды стали ближе, какие отвалились, какие новые проявились?</p>
                            <p>Это не отчётность. Это способ оставаться в контакте с собой по мере того, как ты меняешься. Дерево, которое отражает реальность, помогает. Дерево-галочка, которое стоит без движения — нет.</p>

                                            color: isSelected ? 'rgba(255,255,255,0.7)' : 'var(--ink-muted)',
                                            fontStyle: 'italic',
                                        }}>{opt.hint}</span>
                                    </button>
                                );
                            })}
                        </div>

                        <button onClick={onClose} style={{
                            marginTop: '16px',
                            background: 'transparent',
                            border: 'none',
                            color: 'var(--ink-muted)',
                            cursor: 'pointer',
                            fontFamily: 'Manrope, sans-serif',
                            fontSize: '13px',
                            fontWeight: 500,
                            padding: '6px 0',
                        }}
                        onMouseEnter={(e) => e.target.style.color = 'var(--ink-soft)'}
                        onMouseLeave={(e) => e.target.style.color = 'var(--ink-muted)'}
                        >
                            {isFirstTime ? 'Пропустить' : 'Отмена'}
                        </button>

                        <p className="serif" style={{
                            marginTop: '20px',
                            paddingTop: '16px',
                            borderTop: '1px solid var(--line)',
                            fontSize: '12px',
                            fontStyle: 'italic',
                            color: 'var(--ink-muted)',
                            lineHeight: 1.55,
                        }}>
                            Возвращайся к дереву. Ствол и крона меняются вместе с твоей реальностью. Период реализации тоже можно поменять в меню.
                        </p>
                    </div>
                </div>
            );
        }

        // ===== ГЛАВНЫЙ КОМПОНЕНТ =====
        function TreeApp() {
            const [items, setItems] = useState(() => {
                const saved = localStorage.getItem('treeItems_v6');
                return saved ? JSON.parse(saved) : { roots: [], trunk: [], branches: [], crown: [] };
            });
            const [showWelcome, setShowWelcome] = useState(() => !localStorage.getItem('tree_intro_seen_v1'));
            const [drawerOpen, setDrawerOpen] = useState(false);
            const [aboutOpen, setAboutOpen] = useState(false);
            const [showPanel, setShowPanel] = useState(true);
            const [modal, setModal] = useState(null);
            const [inputText, setInputText] = useState('');
            const [imageLoaded, setImageLoaded] = useState(false);
            const [popoverZone, setPopoverZone] = useState(null);
            const [exampleZone, setExampleZone] = useState(null);
            const [menuOpen, setMenuOpen] = useState(false);
            const [horizon, setHorizon] = useState(() => localStorage.getItem('tree_horizon_v1') || null);
            const [showHorizonDialog, setShowHorizonDialog] = useState(false);
            const [toast, setToast] = useState(null);
            const containerRef = useRef(null);
            const inputRef = useRef(null);

            useEffect(() => { localStorage.setItem('treeItems_v6', JSON.stringify(items)); }, [items]);
            useEffect(() => { if (modal && inputRef.current) inputRef.current.focus(); }, [modal]);
            useEffect(() => {
                if (horizon) localStorage.setItem('tree_horizon_v1', horizon);
            }, [horizon]);
            useEffect(() => {
                if (!toast) return;
                const t = setTimeout(() => setToast(null), 3500);
                return () => clearTimeout(t);
            }, [toast]);

            const closeWelcome = () => {
                localStorage.setItem('tree_intro_seen_v1', '1');
                setShowWelcome(false);
            };

            const handleAdd = (zone) => {
                if (zone === 'roots') {
                    const used = items.roots.map(i => i.slotId);
                    const free = ROOT_SLOTS.find(s => !used.includes(s.id));
                    if (free) setModal({ zone, isNew: true, slotId: free.id });
                    else {
                        const offset = (items.roots.length - ROOT_SLOTS.length) * 3;
                        setModal({ zone, isNew: true, x: 50 + (offset % 30) - 15, y: 88 });
                    }
                } else if (zone === 'branches') {
                    if (items.branches.length >= 5) {
                        setToast({
                            title: 'Сейчас 5 из 5',
                            body: 'Удали одну ветку, чтобы добавить новую — фокус не должен размываться.',
                        });
                        return;
                    }
                    const used = items.branches.map(i => i.slotId);
                    const free = BRANCH_SLOTS.find(s => !used.includes(s.id));
                    setModal({ zone, isNew: true, slotId: free.id });
                } else if (zone === 'crown') {
                    // При добавлении первого плода — спрашиваем горизонт
                    if (items.crown.length === 0 && !horizon) {
                        setShowHorizonDialog(true);
                        return;
                    }
                    const pos = ORANGE_POSITIONS[items.crown.length % ORANGE_POSITIONS.length];
                    setModal({ zone, isNew: true, x: pos.x, y: pos.y });
                } else {
                    setModal({ zone, isNew: true });
                }
                setInputText('');
            };

            const handleHorizonChosen = (value) => {
                setHorizon(value);
                setShowHorizonDialog(false);
                // После выбора горизонта продолжаем добавление плода
                setTimeout(() => {
                    const pos = ORANGE_POSITIONS[items.crown.length % ORANGE_POSITIONS.length];
                    setModal({ zone: 'crown', isNew: true, x: pos.x, y: pos.y });
                    setInputText('');
                }, 100);
            };

            const handleSave = () => {
                if (!inputText.trim()) return;
                if (modal.isNew) {
                    const newItem = {
                        id: Date.now(), text: inputText.trim(),
                        ...(modal.slotId && { slotId: modal.slotId }),
                        ...(modal.zone === 'crown' && { x: modal.x, y: modal.y }),
                        ...(modal.zone === 'roots' && modal.x !== undefined && { x: modal.x, y: modal.y }),
                    };
                    setItems(prev => ({ ...prev, [modal.zone]: [...prev[modal.zone], newItem] }));
                } else {
                    setItems(prev => ({
                        ...prev,
                        [modal.zone]: prev[modal.zone].map(i => i.id === modal.item.id ? { ...i, text: inputText.trim() } : i)
                    }));
                }
                setModal(null); setInputText('');
            };

            const handleEdit = (zone, item) => {
                setModal({ zone, isNew: false, item });
                setInputText(item.text);
            };
            const handleDelete = (zone, id) => {
                setItems(prev => ({ ...prev, [zone]: prev[zone].filter(i => i.id !== id) }));
            };
            const handleDrag = (zone) => (id, newX, newY) => {
                setItems(prev => ({
                    ...prev,
                    [zone]: prev[zone].map(i => i.id === id ? { ...i, x: newX, y: newY, ...(zone === 'trunk' && { pinned: true }) } : i)
                }));
            };
            const handleHarvest = (id) => {
                setItems(prev => ({
                    ...prev,
                    crown: prev.crown.map(i => i.id === id ? { ...i, harvested: !i.harvested } : i)
                }));
            };

            const getTrunkData = () => {
                const autoItems = items.trunk.filter(i => !i.pinned);
                return items.trunk.map(item => {
                    if (item.pinned) return { item, autoX: item.x, autoY: item.y };
                    const idx = autoItems.findIndex(a => a.id === item.id);
                    const r = idx * 0.8;
                    const angle = idx * 2.5;
                    return {
                        item,
                        autoX: TRUNK.centerX + r * Math.cos(angle),
                        autoY: TRUNK.centerY + r * Math.sin(angle),
                    };
                });
            };

            const exportData = () => {
                const blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'my-tree.json'; a.click();
            };
            const clearAll = () => {
                if (confirm('Удалить все записи?')) setItems({ roots: [], trunk: [], branches: [], crown: [] });
            };

            const ZONE_KEYS = ['roots', 'trunk', 'branches', 'crown'];

            return (
                <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', position: 'relative' }}>
                    {/* СЛОГАН-ХЕДЕР */}
                    <div style={{
                        height: '40px',
                        background: 'rgba(15,20,35,0.85)',
                        backdropFilter: 'blur(12px)',
                        WebkitBackdropFilter: 'blur(12px)',
                        borderBottom: '1px solid rgba(255,255,255,0.08)',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        flexShrink: 0,
                        zIndex: 100,
                    }}>
                        <span className="serif" style={{
                            fontSize: '14px',
                            fontStyle: 'italic',
                            color: 'rgba(255,255,255,0.7)',
                            letterSpacing: '0.01em',
                        }}>
                            Опора — не ресурс, а ресурс — не цель
                        </span>
                    </div>

                    {/* ОСНОВНАЯ ОБЛАСТЬ */}
                    <div style={{ display: 'flex', flex: 1, overflow: 'hidden', position: 'relative' }}>
                        {/* СЦЕНА С ДЕРЕВОМ */}
                        <div style={{
                            flex: 1,
                            display: 'flex',
                            alignItems: 'center', justifyContent: 'center',
                            overflow: 'hidden',
                            padding: '20px',
                            position: 'relative',
                            backgroundImage: 'url(tree.png)',
                            backgroundSize: 'cover',
                            backgroundPosition: 'center',
                            backgroundRepeat: 'no-repeat',
                        }}>
                            <div style={{
                                position: 'absolute', inset: 0,
                                backdropFilter: 'blur(30px) brightness(0.6) saturate(1.05)',
                                WebkitBackdropFilter: 'blur(30px) brightness(0.6) saturate(1.05)',
                                background: 'rgba(25,35,45,0.25)',
                                zIndex: 0,
                            }} />

                            <div ref={containerRef} style={{
                                position: 'relative',
                                display: 'inline-block',
                                maxWidth: '100%', maxHeight: '100%',
                                zIndex: 1,
                            }}>
                                <img
                                    src="tree.png" alt="Дерево Опоры"
                                    onLoad={() => setImageLoaded(true)}
                                    style={{
                                        display: 'block',
                                        maxWidth: '100%',
                                        maxHeight: 'calc(100vh - 80px)',
                                        width: 'auto', height: 'auto',
                                        borderRadius: '12px',
                                    }}
                                />
                                {imageLoaded && (
                                    <>
                                        {items.roots.map(item => (
                                            <RootItem key={item.id} item={item}
                                                containerRef={containerRef}
                                                onEdit={(i) => handleEdit('roots', i)}
                                                onDelete={(id) => handleDelete('roots', id)}
                                                onDrag={handleDrag('roots')} />
                                        ))}
                                        {items.branches.map(item => (
                                            <BranchItem key={item.id} item={item}
                                                onEdit={(i) => handleEdit('branches', i)}
                                                onDelete={(id) => handleDelete('branches', id)} />
                                        ))}
                                        {getTrunkData().map(({ item, autoX, autoY }) => (
                                            <TrunkItem key={item.id} item={item} autoX={autoX} autoY={autoY}
                                                containerRef={containerRef}
                                                onEdit={(i) => handleEdit('trunk', i)}
                                                onDelete={(id) => handleDelete('trunk', id)}
                                                onDrag={handleDrag('trunk')} />
                                        ))}
                                        {items.crown.map(item => (
                                            <FruitItem key={item.id} item={item}
                                                containerRef={containerRef}
                                                onEdit={(i) => handleEdit('crown', i)}
                                                onDelete={(id) => handleDelete('crown', id)}
                                                onHarvest={handleHarvest}
                                                onDrag={handleDrag('crown')} />
                                        ))}
                                    </>
                                )}
                            </div>

                            {/* ЛЕВАЯ ШТОРКА С ВОПРОСАМИ */}
                            <QuestionsDrawer
                                open={drawerOpen}
                                onClose={(openIt) => setDrawerOpen(openIt === true ? true : false)}
                            />
                        </div>

                        {/* ПРАВАЯ ПАНЕЛЬ */}
                        <div style={{
                            width: showPanel ? '340px' : '40px',
                            background: '#FDFBF7',
                            borderLeft: '1px solid #E8E2D4',
                            transition: 'width 0.3s cubic-bezier(0.4,0,0.2,1)',
                            display: 'flex', flexDirection: 'column',
                            flexShrink: 0,
                            position: 'relative',
                        }}>
                            <button
                                onClick={() => setShowPanel(!showPanel)}
                                style={{
                                    position: 'absolute',
                                    left: '-16px',
                                    top: '24px',
                                    zIndex: 200,
                                    background: 'white',
                                    border: '1px solid #E8E2D4',
                                    borderRadius: '50%',
                                    width: '32px', height: '32px',
                                    cursor: 'pointer',
                                    color: '#5C5A53',
                                    fontSize: '14px',
                                    boxShadow: '0 2px 8px rgba(43,42,38,0.08)',
                                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                                }}
                            >{showPanel ? '→' : '←'}</button>

                            {showPanel && (
                                <div className="scrollable" style={{ padding: '24px 22px', overflowY: 'auto', flex: 1 }}>
                                    <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: '24px' }}>
                                        <div>
                                            <h1 className="serif" style={{ fontSize: '26px', fontWeight: 500, color: '#2B2A26', letterSpacing: '-0.01em', lineHeight: 1.15 }}>
                                                Дерево Опоры
                                            </h1>
                                            <p style={{ marginTop: '4px', fontSize: '12px', color: '#8A877E', fontWeight: 400 }}>
                                                Roots & Fruits
                                            </p>
                                            {horizon && (
                                                <button
                                                    onClick={() => setShowHorizonDialog(true)}
                                                    style={{
                                                        marginTop: '10px',
                                                        background: 'rgba(184,137,107,0.08)',
                                                        border: '1px solid rgba(184,137,107,0.18)',
                                                        borderRadius: '999px',
                                                        padding: '4px 12px',
                                                        cursor: 'pointer',
                                                        fontFamily: 'Manrope, sans-serif',
                                                        fontSize: '11px',
                                                        fontWeight: 500,
                                                        color: 'var(--terracotta-dark)',
                                                        display: 'inline-flex',
                                                        alignItems: 'center',
                                                        gap: '6px',
                                                        transition: 'background 0.15s',
                                                    }}
                                                    onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(184,137,107,0.14)'}
                                                    onMouseLeave={(e) => e.currentTarget.style.background = 'rgba(184,137,107,0.08)'}
                                                    title="Поменять горизонт"
                                                >
                                                    <span style={{
                                                        width: '5px', height: '5px',
                                                        borderRadius: '50%',
                                                        background: 'var(--terracotta)',
                                                    }} />
                                                    Период реализации: {horizon === '6m' ? '6 месяцев' : horizon === '1y' ? '1 год' : '3 года'}
                                                </button>
                                            )}
                                        </div>
                                        <div style={{ position: 'relative' }}>
                                            <button
                                                onClick={() => setMenuOpen(!menuOpen)}
                                                style={{
                                                    width: '28px', height: '28px',
                                                    borderRadius: '50%',
                                                    border: 'none',
                                                    background: menuOpen ? 'var(--line)' : 'transparent',
                                                    color: 'var(--ink-soft)',
                                                    cursor: 'pointer',
                                                    fontSize: '16px',
                                                    fontWeight: 500,
                                                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                                                    lineHeight: 1,
                                                    transition: 'background 0.15s',
                                                }}
                                            >⋯</button>
                                            {menuOpen && (
                                                <>
                                                    <div onClick={() => setMenuOpen(false)} style={{
                                                        position: 'fixed', inset: 0, zIndex: 199,
                                                    }} />
                                                    <div style={{
                                                        position: 'absolute',
                                                        top: '36px',
                                                        right: 0,
                                                        background: 'white',
                                                        border: '1px solid var(--line)',
                                                        borderRadius: '10px',
                                                        boxShadow: '0 8px 24px rgba(43,42,38,0.12)',
                                                        padding: '4px',
                                                        zIndex: 200,
                                                        minWidth: '200px',
                                                        animation: 'scaleIn 0.15s',
                                                    }}>
                                                        <MenuItem onClick={() => { setShowWelcome(true); setMenuOpen(false); }}>Снова показать введение</MenuItem>
                                                        <MenuItem onClick={() => { setShowHorizonDialog(true); setMenuOpen(false); }}>
                                                            {horizon ? 'Поменять период реализации' : 'Задать период реализации'}
                                                        </MenuItem>
                                                        <MenuItem onClick={() => { setAboutOpen(true); setMenuOpen(false); }}>О подходе</MenuItem>
                                                        <div style={{ height: '1px', background: 'var(--line)', margin: '4px 0' }} />
                                                        <MenuItem onClick={() => { exportData(); setMenuOpen(false); }}>Экспорт данных</MenuItem>
                                                        <MenuItem onClick={() => { clearAll(); setMenuOpen(false); }} danger>Очистить дерево</MenuItem>
                                                    </div>
                                                </>
                                            )}
                                        </div>
                                    </div>

                                    {/* Кнопки добавления */}
                                    <div style={{ marginBottom: '20px' }}>
                                        <h3 style={{
                                            fontSize: '11px', fontWeight: 600,
                                            textTransform: 'uppercase', letterSpacing: '0.08em',
                                            color: '#8A877E', marginBottom: '10px',
                                        }}>Добавить</h3>
                                        <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                                            {ZONE_KEYS.map(zone => {
                                                const info = ZONE_INFO[zone];
                                                const count = items[zone].length;
                                                const limit = zone === 'branches' ? 5 : null;
                                                const harvested = zone === 'crown' ? items.crown.filter(i => i.harvested).length : 0;
                                                return (
                                                    <AddButton
                                                        key={zone}
                                                        zone={zone}
                                                        info={info}
                                                        count={count}
                                                        limit={limit}
                                                        harvested={harvested}
                                                        onClick={() => handleAdd(zone)}
                                                        onInfo={() => setPopoverZone(popoverZone === zone ? null : zone)}
                                                        popoverOpen={popoverZone === zone}
                                                        disabled={false}
                                                        onShowExample={() => setExampleZone(zone)}
                                                    />
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {/* Модалка редактирования */}
                                    {modal && (
                                        <div style={{
                                            background: 'white', padding: '18px',
                                            borderRadius: '14px', marginBottom: '20px',
                                            border: '1px solid var(--line)',
                                            boxShadow: '0 2px 4px rgba(43,42,38,0.04), 0 4px 12px rgba(43,42,38,0.08)',
                                        }}>
                                            <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '14px' }}>
                                                <div style={{ width: '8px', height: '8px', borderRadius: '50%', background: ZONE_INFO[modal.zone].bg }} />
                                                <span style={{ fontSize: '11px', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.08em', color: '#8A877E' }}>
                                                    {modal.isNew ? 'Новая' : 'Редактирование'} · {ZONE_INFO[modal.zone].label}
                                                </span>
                                            </div>
                                            <input
                                                ref={inputRef}
                                                className="app-input"
                                                type="text"
                                                value={inputText}
                                                onChange={(e) => setInputText(e.target.value)}
                                                placeholder="Название..."
                                                onKeyDown={(e) => {
                                                    if (e.key === 'Enter') handleSave();
                                                    if (e.key === 'Escape') { setModal(null); setInputText(''); }
                                                }}
                                                style={{ marginBottom: '12px' }}
                                            />
                                            <div style={{ display: 'flex', gap: '8px' }}>
                                                <button onClick={handleSave} style={{
                                                    flex: 1, padding: '10px 14px',
                                                    background: 'var(--ink)', color: 'white',
                                                    border: 'none', borderRadius: '8px', cursor: 'pointer',
                                                    fontFamily: 'Manrope, sans-serif', fontSize: '13px', fontWeight: 500,
                                                    transition: 'background 0.15s',
                                                }}
                                                onMouseEnter={(e) => e.target.style.background = '#000'}
                                                onMouseLeave={(e) => e.target.style.background = 'var(--ink)'}
                                                >Сохранить</button>
                                                <button onClick={() => { setModal(null); setInputText(''); }} style={{
                                                    padding: '10px 14px',
                                                    background: 'transparent', color: 'var(--ink-soft)',
                                                    border: '1px solid var(--line)', borderRadius: '8px', cursor: 'pointer',
                                                    fontFamily: 'Manrope, sans-serif', fontSize: '13px', fontWeight: 500,
                                                }}>Отмена</button>
                                            </div>
                                        </div>
                                    )}

                                    {/* Подсказка-туториал */}
                                    <div style={{
                                        padding: '14px',
                                        background: 'rgba(184,137,107,0.06)',
                                        borderRadius: '10px',
                                        marginBottom: '20px',
                                    }}>
                                        <div style={{ fontSize: '11px', fontWeight: 600, color: 'var(--terracotta-dark)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: '6px' }}>
                                            Подсказка
                                        </div>
                                        <p style={{ fontSize: '12px', color: 'var(--ink-soft)', lineHeight: 1.55 }}>
                                            Кликни <span style={{ display: 'inline-flex', width: '14px', height: '14px', borderRadius: '50%', background: 'var(--line)', color: 'var(--ink-soft)', alignItems: 'center', justifyContent: 'center', fontFamily: 'Fraunces, serif', fontSize: '9px', fontStyle: 'italic', verticalAlign: 'middle', fontWeight: 600 }}>i</span> чтобы узнать про каждый тип. Опоры, ресурсы и плоды можно перетаскивать мышкой.
                                        </p>
                                    </div>

                                    {/* Подвал — О подходе */}
                                    <div style={{
                                        marginTop: 'auto',
                                        paddingTop: '20px',
                                        borderTop: '1px solid var(--line)',
                                    }}>
                                        <button
                                            onClick={() => setAboutOpen(true)}
                                            style={{
                                                background: 'transparent',
                                                border: 'none',
                                                color: 'var(--accent)',
                                                cursor: 'pointer',
                                                fontFamily: 'Manrope, sans-serif',
                                                fontSize: '12px',
                                                fontWeight: 500,
                                                padding: '4px 0',
                                                display: 'flex', alignItems: 'center', gap: '4px',
                                            }}
                                            onMouseEnter={(e) => e.target.style.textDecoration = 'underline'}
                                            onMouseLeave={(e) => e.target.style.textDecoration = 'none'}
                                        >
                                            О подходе →
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* МОДАЛКИ */}
                    {showWelcome && <WelcomeModal onClose={closeWelcome} />}
                    {exampleZone && <ExampleModal zone={exampleZone} onClose={() => setExampleZone(null)} />}
                    {aboutOpen && <AboutPage onClose={() => setAboutOpen(false)} />}
                    {showHorizonDialog && (
                        <HorizonDialog
                            currentValue={horizon}
                            isFirstTime={items.crown.length === 0 && !horizon}
                            onChoose={handleHorizonChosen}
                            onClose={() => {
                                setShowHorizonDialog(false);
                                // Если это был первый плод и пользователь пропустил — всё равно открываем модалку плода
                                if (items.crown.length === 0 && !horizon) {
                                    setTimeout(() => {
                                        const pos = ORANGE_POSITIONS[0];
                                        setModal({ zone: 'crown', isNew: true, x: pos.x, y: pos.y });
                                        setInputText('');
                                    }, 100);
                                }
                            }}
                        />
                    )}
                    {toast && <Toast title={toast.title} body={toast.body} onClose={() => setToast(null)} />}
                </div>
            );
        }

        function MenuItem({ onClick, children, danger }) {
            const [hover, setHover] = useState(false);
            return (
                <button
                    onClick={onClick}
                    onMouseEnter={() => setHover(true)}
                    onMouseLeave={() => setHover(false)}
                    style={{
                        width: '100%',
                        padding: '8px 12px',
                        background: hover ? (danger ? 'rgba(220,80,80,0.06)' : 'rgba(0,0,0,0.04)') : 'transparent',
                        color: danger ? '#C43B3B' : 'var(--ink)',
                        border: 'none',
                        borderRadius: '6px',
                        cursor: 'pointer',
                        fontFamily: 'Manrope, sans-serif',
                        fontSize: '12px',
                        fontWeight: 500,
                        textAlign: 'left',
                        transition: 'background 0.1s',
                    }}
                >{children}</button>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<TreeApp />);
    </script>
</body>
</html>
